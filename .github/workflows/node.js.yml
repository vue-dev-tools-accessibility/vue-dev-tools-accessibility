name: Node.js CI

env:
  PROTO_TELEMETRY: false

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - uses: moonrepo/setup-toolchain@v0
      with:
        auto-install: true
    - run: node -v
    - run: npm -v
    - run: npm ci
    - run: npm run lint
    - run: npm run build
    - run: npm t
